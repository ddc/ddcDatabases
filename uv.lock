version = "4.0.2"
source = { editable = "." }
dependencies = [
    { name = "pydantic-settings" },
    { name = "sqlalchemy", extra = ["asyncio"] },
]

[package.optional-dependencies]
mariadb = [
    { name = "aiomysql" },
    { name = "mysqlclient" },
]
mongodb = [
    { name = "motor" },
]
mssql = [
    { name = "aioodbc" },
    { name = "pyodbc" },
]
mysql = [
    { name = "aiomysql" },
    { name = "mysqlclient" },
]
oracle = [
    { name = "oracledb" },
]
pgsql = [
    { name = "asyncpg" },
    { name = "psycopg", extra = ["binary"] },
]
postgres = [
    { name = "asyncpg" },
    { name = "psycopg", extra = ["binary"] },
]

[package.dev-dependencies]
dev = [
    { name = "coverage" },
    { name = "poethepoet" },
    { name = "pytest-asyncio" },
    { name = "ruff" },
    { name = "testcontainers", extra = ["mongodb", "mssql", "mysql", "oracle"] },
]

[package.metadata]
requires-dist = [
    { name = "aiomysql", marker = "extra == 'mysql'", specifier = ">=0.3.2" },
    { name = "aioodbc", marker = "extra == 'mssql'", specifier = ">=0.5.0" },
    { name = "asyncpg", marker = "extra == 'postgres'", specifier = ">=0.31.0" },
    { name = "ddcdatabases", extras = ["mysql"], marker = "extra == 'mariadb'" },
    { name = "ddcdatabases", extras = ["postgres"], marker = "extra == 'pgsql'" },
    { name = "motor", marker = "extra == 'mongodb'", specifier = ">=3.7.1" },
    { name = "mysqlclient", marker = "extra == 'mysql'", specifier = ">=2.2.8" },
    { name = "oracledb", marker = "extra == 'oracle'", specifier = ">=3.4.2" },
    { name = "psycopg", extras = ["binary"], marker = "extra == 'postgres'", specifier = ">=3.3.3" },
    { name = "pydantic-settings", specifier = ">=2.11.0" },
    { name = "pyodbc", marker = "extra == 'mssql'", specifier = ">=5.3.0" },
    { name = "sqlalchemy", extras = ["asyncio"], specifier = ">=2.0.49" },
]
provides-extras = ["mongodb", "oracle", "mssql", "mysql", "postgres", "pgsql", "mariadb"]

[package.metadata.requires-dev]
dev = [
    { name = "coverage", specifier = ">=7.13.5" },
    { name = "poethepoet", specifier = ">=0.43.0" },
    { name = "pytest-asyncio", specifier = ">=1.3.0" },
    { name = "ruff", specifier = ">=0.15.9" },
    { name = "testcontainers", extras = ["postgres", "mysql", "mssql", "mongodb", "oracle"], specifier = ">=4.14.2" },
]

