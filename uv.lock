]

[package.optional-dependencies]
mariadb = [
    { name = "aiomysql" },
    { name = "mysqlclient" },
]
mongodb = [
    { name = "motor" },
]
mssql = [
    { name = "aioodbc" },
    { name = "pyodbc" },
]
